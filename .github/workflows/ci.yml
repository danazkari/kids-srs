name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build E2E image
        run: docker build -f Dockerfile.e2e -t kids-srs-e2e .
      - name: Run E2E
        run: |
          mkdir -p e2e/reports e2e/screenshots
          docker run --rm \
            -v "${{ github.workspace }}/e2e/reports:/app/e2e/reports" \
            -v "${{ github.workspace }}/e2e/screenshots:/app/e2e/screenshots" \
            kids-srs-e2e
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            e2e/reports
            e2e/screenshots
          retention-days: 7
